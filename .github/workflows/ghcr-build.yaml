#
name: Create and publish a container image to GitHub's Registry

# Configures this workflow to run every time a change is pushed to the branch called `release`.
on:
  push:
    branches: ['release']

# Defines two custom environment variables for the workflow. These are used for the Container registry domain (`ghcr.io`), and a name for the Docker image that this workflow builds.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      # Uses the `docker/login-action` action to log in to the Container registry using the account and password that will publish the packages. Once published, the packages are scoped to the account defined here.
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.BUILD }}
      # Creates version tag using some regex.
      - name: Generate version
        id: version
        # Props to https://regex101.com for helping me with this. RegEx is not my forte.
        run: |
          LATEST=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          MINOR=$(echo "$LATEST" | sed 's/^v[0-9]*\.//')
          MAJOR=$(echo "$LATEST" | sed 's/^v\([0-9]*\)\..*/\1/')
          NEXT="v${MAJOR}.$((MINOR + 1))"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
      # This step uses [docker/metadata-action](https://github.com/docker/metadata-action#about) to extract tags and labels that will be applied to the specified image. The `id` "meta" allows the output of this step to be referenced in a subsequent step. The `images` value provides the base name for the tags and labels.
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.tag }}
      # This step uses the `docker/build-push-action` action to build the image, based on your repository's `Dockerfile`. If the build succeeds, it pushes the image to GitHub Packages.
      # It uses the `context` parameter to define the build's context as the set of files located in the specified path. For more information, see [Usage](https://github.com/docker/build-push-action#usage) in the README of the `docker/build-push-action` repository.
      # It uses the `tags` and `labels` parameters to tag and label the image with the output from the "meta" step.
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.dockerbuild
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      
      # This step generates an artifact attestation for the image, which is an unforgeable statement about where and how it was built. It increases supply chain security for people who consume the image. For more information, see [Using artifact attestations to establish provenance for builds](/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds).
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          # push-to-registry: true ## COMMENTING OUT: Podman does not pull the image; commenting out to remove Sigstore attestation from the OCI artifact
      # Creates GitHub release using Softprops' "action-gh-release" action
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## STCKRSLAP - ${{ steps.version.outputs.tag }}

            **Docker** 🐳:
            ```
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
            ```

            **Podman** 🦦:
            ```
            podman pull ghcr.io/${{ github.repository}}:${{ steps.version.outputs.tag }}
            ```

            **Supported Platforms:** Linux (`amd64`,`arm64`)
            **Digest:** `${{ steps.push.outputs.digest }}`
          generate_release_notes: true
